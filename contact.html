<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect – SDAC Academy</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .page-header { background: #0f172a; padding: 120px 0 80px; text-align: center; color: white; margin-bottom: 80px; border-bottom: 4px solid var(--primary-color); }
        .form-card { background: white; border: 1px solid #f1f5f9; border-radius: 28px; padding: 60px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 24px; }
        .form-label { font-size: 0.72rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .form-input { width: 100%; padding: 18px 24px; border-radius: 16px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; transition: 0.3s; }
        .form-input:focus { outline: none; border-color: #00BFFF; background: white; }
        
        .nav-link { font-weight: 700; color: white; text-decoration: none; font-size: 1rem; opacity: 0.8; margin: 0 20px; transition: 0.3s; }
        .nav-link:hover { opacity: 1; color: var(--primary-color); }
    </style>
</head>
<body style="background: #fff;">

    <nav style="position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 60px; display: flex; justify-content: space-between; align-items: center; background: #0f172a;">
        <div style="font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 900; color: white;">SD<span style="color: #00BFFF;">AC</span></div>
        <div>
            <a href="index.html" class="nav-link">Home</a>
            <a href="courses.html" class="nav-link">Academy Tracks</a>
            <a href="about.html" class="nav-link">About Us</a>
            <a href="contact.html" class="nav-link" style="background: white; color: #0f172a; padding: 12px 32px; border-radius: 99px; opacity: 1;">Enroll Now</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 style="font-family: 'Poppins', sans-serif; font-size: 3rem; font-weight: 900; line-height: 1;">Connect <span style="color: #00BFFF;">Directly</span></h1>
            <p style="opacity: 0.8; font-size: 1.25rem; margin-top: 16px;">Initiate your scholarly enrollment via our admissions office.</p>
        </div>
    </header>

    <section style="padding-bottom: 120px;">
        <div class="container" style="max-width: 700px;">
            <div class="form-card">
                <form action="index.html">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" placeholder="e.g. Scholar Maseno" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" placeholder="e.g. s.maseno@sdac.edu" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Select Track</label>
                        <select class="form-input" required>
                            <option value="">Choose your path...</option>
                            <option value="ux">UX Engineering</option>
                            <option value="ai">AI Architecture</option>
                            <option value="cyber">Cybersecurity</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message</label>
                        <textarea class="form-input" style="min-height: 120px; resize: none;" placeholder="Explain your academic goals..."></textarea>
                    </div>
                    <button type="submit" style="width: 100%; padding: 22px; border-radius: 16px; background: #00BFFF; color: #fff; font-weight: 800; font-size: 1.1rem; border: none; cursor: pointer; margin-top: 20px;">Submit Application</button>
                    <p style="text-align: center; font-size: 0.8rem; color: #94a3b8; margin-top: 24px;">Admissions will respond within 48 scholarly hours.</p>
                </form>
            </div>
        </div>
    </section>

    <footer style="background: #0f172a; padding: 80px 0; color: white; text-align: center;">
        <p style="opacity: 0.6;">© 2026 Skope Digital Academy (SDAC). All rights reserved.</p>
    </footer>

</body>
</html>
